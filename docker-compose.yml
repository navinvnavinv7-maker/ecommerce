services:
  app:
    build:
      context: .
    container_name: ecommerce-app
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 3000
    expose:
      - "3000"
    volumes:
      - ecommerce_uploads:/app/uploads

  nginx:
    image: nginx:1.27-alpine
    container_name: ecommerce-nginx
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  ecommerce_uploads:
